[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "https://insideoutjoinery.com.au/*"
  to = "https://insideoutjoinery.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.insideoutjoinery.com.au/*"
  to = "https://insideoutjoinery.au/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/kitchen-renovations-sydney.php"
  to = "/kitchens"
  status = 301

[[redirects]]
  from = "/bathroom-renovations-sydney.php"
  to = "/bathrooms"
  status = 301

[[redirects]]
  from = "/wardrobe-installation-sydney.php"
  to = "/wardrobes"
  status = 301

[[redirects]]
  from = "/laundry-renovations-sydney.php"
  to = "/laundry"
  status = 301

[[redirects]]
  from = "/custom-joinery-sydney.php"
  to = "/custom-joinery"
  status = 301

[[redirects]]
  from = "/contact-us.php"
  to = "/contact"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
